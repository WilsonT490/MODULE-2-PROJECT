<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary</title>
    <link rel="stylesheet" href=".//style.css">
</head>
<body>

    <h1>Wordly Dictionary</h1>

    <!-- Search Form -->
    <form id="search-form">
        <input type="text" id="search-input" placeholder="Enter a word..." required>
        <button type="submit">Search</button>
    </form>

    <!-- Error Message -->
     <div id="error-message" class="hidden"></div>

     <!-- Results Section -->
      <section id="result">
    <h2 id="word"></h2>
    <p id="phonetic"></p>
    <audio id="audio" controls class="hidden"></audio>

    <div id="definitions"></div>
    <div id="synonyms"></div>
  </section>

  <!-- JavaScript -->
  <script defer src=".//script.js"></script>
</body>
</html>
